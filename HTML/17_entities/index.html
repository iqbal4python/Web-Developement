<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entities</title>
</head>
<body>
    <h1>HTML Entities</h1>
    <p>HTML entities are special codes used to display reserved characters or symbols in HTML that would otherwise be interpreted as markup or not easily typed.</p>
    <ul>
        <li>The code for paragraph tag is &ltp&gt&ltp/&gt </li>
        <li>The code for non-breaking space is &amp;nbsp</li>
        <li>non-breaking&nbsp;&nbsp;&nbsp;space</li>
    </ul>
</body>
