<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Lakshyabhed Shikshangan</h1>
    <div>
        <h2>Admission Form</h2>

        <form action="post">

            <div>
                <label for="student_name">Student Name: </label>
                <input type="text" id="student_name" name="student_name" placeholder="Enter your name">
            </div>
             <div>
                <label for="class">Class: </label>
                <select name="class" id="class">

                    <option value="I">I</option>
                    
                    <option value="II">II</option>
                    
                    <option value="III">III</option>
                    
                    <option value="IV">IV</option>
                    
                    <option value="V">V</option>
                    
                    <option value="VI">VI</option>
                    
                    <option value="VII">VII</option>
                    
                    <option value="VIII">VIII</option>
                    
                    <option value="IX">IX</option>
                    
                    <option value="X">X</option>

                </select>
            </div>
            <div>
                <label for="gender">Gender: </label>
                <span>
                    <label for="male">Male</label>
                    <input type="radio" id="male" name="gender" value="M">
                </span>

                <span>
                    <label for="female">Female</label>
                    <input type="radio" id="female" name="gender" value="F">
                </span>
                <span>
                    <label for="others">Others</label>
                    <input type="radio" id="others" name="gender" value="O">
                </span>
            </div>
            <div>
                <label for="assets">Available Assets: </label>
                <span>
                    <label for="mobile">Mobile Phone:</label>
                    <input type="checkbox" id="mobile" name="mobile" value="mobile">
                </span>
                <span>
                    <label for="laptop">Laptop/Desktop: </label>
                    <input type="checkbox" id="laptop" name="laptop" value="laptop">
                </span>
                <span>
                    <label for="broadband">Broadband/Wifi:</label>
                    <input type="checkbox" id="broadband" name="broadband" value="broadband">
                </span>
                
            </div>
           
            <div>
                <label for="comment">Comment:</label>
               <textarea name="comment" id="comment"
               rows="5"
               cols="35"
               placeholder="Tell us more about yourself OR ask any query."
               ></textarea>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
