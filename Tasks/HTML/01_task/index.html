<!--
Task1: Without using br tag, write a vertically aligned form asking for name, city and pincode of a user.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML_Forms_Task_01</title>
</head>
<body>
    <h1>HTML Forms Task 01</h1>
    <div>
        <label for="name">Name: </label>
        <input type="text" id="name" name="name">
    </div>
    <div>
        <label for="city">City: </label>
        <input type="text" id="city" name="city">
    </div>
    <div>
        <label for="pin">Pin code: </label>
        <input type="text" id="pin" >
    </div>

    
</body>
</html>
