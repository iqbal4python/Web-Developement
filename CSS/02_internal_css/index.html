<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS</title>
    <style>
        h1{
            color: white;
            background-color: darkslategrey;
        }
        div{
            color: lightgreen;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Internal CSS</h1>
    <div>Internal CSS means writing CSS inside the same HTML file using the &lt;style&gt; tag. The &lt;style&gt; tag is placed inside the &lt;head&gt; section.</div>
</body>
</html>
